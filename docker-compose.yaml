version: '3.8'

services:
  apisix:
    image: apache/apisix:latest
    container_name: apisix-gateway
    environment:
      - CONSUMER_API_KEY
      - INTERNAL_OLLAMA_TOKEN
    volumes:
      - ./config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ${LOCAL_OLLAMA_MODELS:-/usr/share/ollama/.ollama}:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always
