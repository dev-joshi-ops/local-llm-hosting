version: '3.8'

services:
  apisix:
    image: apache/apisix:latest
    container_name: apisix-gateway
    environment:
      - CONSUMER_API_KEY
      - INTERNAL_OLLAMA_TOKEN
    volumes:
      - ./config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    network_mode: host
