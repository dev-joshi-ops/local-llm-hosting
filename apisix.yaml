consumers:
  - username: "dev-user"
    plugins:
      key-auth:
        key: "${{CONSUMER_API_KEY}}"
routes:
  - id: "1"
    name: "Ollama-Compatible-Gateway"
    uri: "/v1/chat/completions"
    plugins:
      key-auth: 
        header: "apikey"
      ai-proxy:
        provider: "openai-compatible"
        auth:
          header:
            Authorization: "Bearer ${{INTERNAL_OLLAMA_TOKEN}}"
        override:
          endpoint: "${{OLLAMA_ENDPOINT}}"
        logging:
          summaries: true
      file-logger:
        path: "/dev/stdout"
      ai-rate-limiting:
        instances:
          - name: "gemma4:e4b"
            limit: 10000
            time_window: 3600
          - name: "gemma4:26b-a4b-it-q4_K_M"
            limit: 5000
            time_window: 3600
        limit_strategy: "total_tokens"
        rejected_code: 429
        rejected_msg: "{\"error\": \"Model quota exceeded. Check model-specific limits in documentation.\"}"

#END