consumers:
  - username: "dev-user"
    plugins:
      key-auth:
        key: "${{CONSUMER_API_KEY}}"
routes:
  - id: "1"
    name: "Ollama-Compatible-Gateway"
    uri: "/v1/chat/completions"
    plugins:
      key-auth: 
        header: "apikey"
      ai-proxy:
        provider: "openai-compatible"
        auth:
          header:
            Authorization: "Bearer ${{INTERNAL_OLLAMA_TOKEN}}"
        override:
          endpoint: "http://127.0.0.1:11434/v1/chat/completions"
        logging:
          summaries: true
      file-logger:
        path: "/dev/stdout"

#END